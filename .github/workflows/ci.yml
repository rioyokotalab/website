name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    name: Offline checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out complete history without persisted credentials
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch the pinned public guarded-delete harness
        run: |
          git init "$RUNNER_TEMP/harness"
          git -C "$RUNNER_TEMP/harness" fetch --depth=1 \
            https://github.com/rioyokotalab/harness.git \
            6bcadab38e94540fbce33143962bb38057a44e1b
          git -C "$RUNNER_TEMP/harness" checkout --detach FETCH_HEAD
          test "$(git -C "$RUNNER_TEMP/harness" rev-parse HEAD)" = \
            6bcadab38e94540fbce33143962bb38057a44e1b

      - name: Install the pinned local-mirror test dependency
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            lftp=4.9.2-2ubuntu1.1
          lftp --version | grep -F 'Version 4.9.2'

      - name: Validate ledger and static-site policy
        env:
          HARNESS_BIN: ${{ runner.temp }}/harness/bin/harness
        run: |
          python3 tools/task-metrics.py validate
          python3 tools/check-md-size.py
          python3 tools/standards-check.py
          tools/test-security.sh

      - name: Install locked browser-test dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run locked browser tests
        run: npm run test:browser
