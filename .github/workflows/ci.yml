name: CI

# Pull-request-only: the main ruleset's strict up-to-date policy plus squash
# merges make a post-merge push run byte-identical to the tested PR head, and
# the duplicate run only generated redundant actor notification emails.
on:
  pull_request:
    branches: [main]

# Least privilege: no token scope by default; the job grants only what it needs.
permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    name: Offline checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out complete history without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install the pinned local-mirror test dependency
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            lftp=4.9.2-2ubuntu1.1
          lftp --version | grep -F 'Version 4.9.2'

      - name: Validate ledger and static-site policy
        run: |
          python3 tools/task-metrics.py validate
          python3 tools/check-md-size.py
          python3 tools/standards-check.py
          tools/test-security.sh

      - name: Install locked browser-test dependencies
        run: |
          npm ci --ignore-scripts
          PLAYWRIGHT_BROWSERS_PATH=.playwright/browsers \
            npx playwright install --with-deps chromium

      - name: Run locked browser tests
        run: npm run test:browser
