# Keep pinned CI actions and the pinned test dependency current with low noise.
# Monthly, grouped into a single PR per ecosystem so updates travel through the
# normal protected-PR + required-CI route rather than as a stream of emails.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns: ["*"]
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps"
